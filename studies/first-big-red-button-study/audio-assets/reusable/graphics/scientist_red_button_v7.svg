<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes pressDown {
  0%, 15% { transform: translateY(0); }
  35%, 55% { transform: translateY(28px); }
  75%, 100% { transform: translateY(0); }
}
@keyframes blink {
  0%, 90%, 100% { transform: scaleY(1); }
  94%, 96% { transform: scaleY(0.05); }
}
@keyframes bodyBob {
  0%, 15% { transform: translateY(0); }
  35%, 55% { transform: translateY(4px); }
  75%, 100% { transform: translateY(0); }
}
.press-sync { animation: pressDown 2.4s ease-in-out infinite; }
.eye-group { animation: blink 4s ease-in-out infinite; transform-origin: center center; }
.body-bob { animation: bodyBob 2.4s ease-in-out infinite; }
</style>

<!-- ===== BUTTON HOUSING BACK ===== -->
<g transform="translate(210, 395)">
  <ellipse cx="0" cy="56" rx="65" ry="7" fill="#1a0a0a" opacity="0.07"/>
  <path d="M-56 0 L-50 52 L50 52 L56 0 Z" fill="#7a0000" stroke="#444" stroke-width="1.5"/>
  <path d="M-56 0 L-50 52 L-46 50 L-52 0 Z" fill="#a02020" opacity="0.3"/>
  <path d="M46 50 L50 52 L56 0 L52 0 Z" fill="#400000" opacity="0.35"/>
  <ellipse cx="0" cy="0" rx="56" ry="13" fill="#850000"/>
</g>

<!-- ===== PRESS GROUP: button + arm + hand move together ===== -->
<g class="press-sync">
  <!-- Button cylinder -->
  <g transform="translate(210, 395)">
    <rect x="-40" y="-56" width="80" height="58" rx="4" fill="#C41818" stroke="#444" stroke-width="1.5"/>
    <rect x="-36" y="-54" width="72" height="54" rx="3" fill="#DD2828"/>
    <rect x="-32" y="-52" width="16" height="46" rx="2" fill="#EE4444" opacity="0.28"/>
    <rect x="-12" y="-52" width="7" height="46" rx="2" fill="#EE4444" opacity="0.15"/>
    <ellipse cx="0" cy="-56" rx="40" ry="11" fill="#E63030" stroke="#444" stroke-width="1.5"/>
    <ellipse cx="0" cy="-58" rx="36" ry="9" fill="#EE4444"/>
    <ellipse cx="-10" cy="-61" rx="14" ry="4" fill="#FF5858" opacity="0.4"/>
  </g>

  <!-- ARM: smooth curve from left shoulder area down to button -->
  <path d="M396 228 C350 225, 300 230, 270 260 C240 290, 218 310, 212 325" fill="none" stroke="#e8e8e5" stroke-width="20" stroke-linecap="round"/>
  <path d="M396 228 C350 225, 300 230, 270 260 C240 290, 218 310, 212 325" fill="none" stroke="#444" stroke-width="21.5" stroke-linecap="round" opacity="0.08"/>
  <path d="M396 228 C350 225, 300 230, 270 260 C240 290, 218 310, 212 325" fill="none" stroke="#f0f0ed" stroke-width="18" stroke-linecap="round"/>

  <!-- HAND: closed fist with index finger pointing down -->
  <g transform="translate(210, 322)">
    <!-- Closed fist (curled fingers facing viewer) -->
    <ellipse cx="0" cy="0" rx="18" ry="14" fill="#7ec8e3" stroke="#444" stroke-width="1.3"/>
    <!-- Knuckle bumps on top of fist -->
    <ellipse cx="-8" cy="-10" rx="5.5" ry="6" fill="#7ec8e3" stroke="#444" stroke-width="1.1"/>
    <ellipse cx="2" cy="-11" rx="5" ry="5.5" fill="#7ec8e3" stroke="#444" stroke-width="1.1"/>
    <ellipse cx="11" cy="-9" rx="4.5" ry="5.5" fill="#7ec8e3" stroke="#444" stroke-width="1.1"/>
    <!-- Thumb wrapped around side -->
    <ellipse cx="-17" cy="2" rx="6" ry="9" fill="#7ec8e3" stroke="#444" stroke-width="1.1" transform="rotate(-15,-17,2)"/>

    <!-- INDEX FINGER: straight down from fist bottom -->
    <rect x="-6" y="10" width="12" height="30" rx="6" fill="#7ec8e3" stroke="#444" stroke-width="1.3"/>
    <ellipse cx="0" cy="40" rx="6" ry="4.5" fill="#6ab5d4" stroke="#444" stroke-width="1"/>
  </g>
</g>

<!-- ===== HOUSING FRONT (covers cylinder on descent) ===== -->
<g transform="translate(210, 395)">
  <path d="M-56 0 L-50 52 L50 52 L56 0 Z" fill="#8B0000"/>
  <path d="M-56 0 L-50 52 L-46 50 L-52 0 Z" fill="#B02020" opacity="0.22"/>
  <path d="M46 50 L50 52 L56 0 L52 0 Z" fill="#400000" opacity="0.28"/>
  <ellipse cx="0" cy="0" rx="56" ry="13" fill="#A00000" stroke="#444" stroke-width="1.5"/>
  <ellipse cx="0" cy="-1.5" rx="52" ry="10" fill="#900000"/>
  <ellipse cx="-14" cy="-4" rx="16" ry="3.5" fill="#B01010" opacity="0.3"/>
</g>

<!-- ===== SCIENTIST BODY ===== -->
<g class="body-bob">
  <g transform="translate(430, 148)">
    <!-- Neck -->
    <rect x="-5" y="38" width="10" height="32" rx="4" fill="#7ec8e3" stroke="#444" stroke-width="1"/>
    <!-- Lab coat -->
    <rect x="-34" y="68" width="68" height="128" rx="9" fill="#f2f2f0" stroke="#444" stroke-width="1.6"/>
    <!-- Coat details -->
    <line x1="0" y1="72" x2="0" y2="196" stroke="#e0e0dc" stroke-width="0.8"/>
    <rect x="-9" y="78" width="18" height="11" rx="2" fill="#5DCAA5" opacity="0.4"/>
    <rect x="-24" y="96" width="22" height="16" rx="2" fill="none" stroke="#ccc" stroke-width="0.7"/>
    <rect x="-8" y="152" width="16" height="16" rx="2.5" fill="#85B7EB" opacity="0.3" stroke="#378ADD" stroke-width="0.5"/>
    <!-- Legs -->
    <rect x="-22" y="196" width="20" height="74" rx="6" fill="#7ec8e3" stroke="#444" stroke-width="1.4"/>
    <rect x="2" y="196" width="20" height="74" rx="6" fill="#7ec8e3" stroke="#444" stroke-width="1.4"/>
    <!-- Shoes -->
    <ellipse cx="-12" cy="272" rx="16" ry="7" fill="#555" stroke="#444" stroke-width="1.2"/>
    <ellipse cx="12" cy="272" rx="16" ry="7" fill="#555" stroke="#444" stroke-width="1.2"/>
  </g>

  <!-- Head -->
  <g transform="translate(430, 148)">
    <circle cx="0" cy="0" r="44" fill="#7ec8e3" stroke="#444" stroke-width="1.8"/>
    <circle cx="0" cy="-2" r="41" fill="#92d5ed"/>
    <!-- Ear -->
    <ellipse cx="40" cy="4" rx="8" ry="10" fill="#7ec8e3" stroke="#444" stroke-width="1.2"/>
    <!-- Glasses arms -->
    <rect x="-48" y="-14" width="16" height="7" rx="3.5" fill="#f2f2f0" stroke="#444" stroke-width="1"/>
    <rect x="32" y="-14" width="16" height="7" rx="3.5" fill="#f2f2f0" stroke="#444" stroke-width="1"/>
    <!-- Glasses frame -->
    <rect x="-37" y="-22" width="74" height="26" rx="5" fill="none" stroke="#555" stroke-width="1.5"/>
    <circle cx="-17" cy="-10" r="11" fill="none" stroke="#555" stroke-width="1.3"/>
    <circle cx="17" cy="-10" r="11" fill="none" stroke="#555" stroke-width="1.3"/>
    <line x1="-6" y1="-10" x2="6" y2="-10" stroke="#555" stroke-width="1"/>
    <!-- Eyes -->
    <g class="eye-group">
      <circle cx="-17" cy="-8" r="4" fill="#444"/>
      <circle cx="-15" cy="-10" r="1.3" fill="#fff"/>
      <circle cx="17" cy="-8" r="4" fill="#444"/>
      <circle cx="19" cy="-10" r="1.3" fill="#fff"/>
    </g>
    <!-- Mouth -->
    <path d="M-7 16 Q0 23 7 16" fill="none" stroke="#444" stroke-width="1.6" stroke-linecap="round"/>
    <!-- Hair -->
    <path d="M-26 -44 Q-12 -64 5 -54 Q20 -48 26 -58 Q32 -44 18 -40" fill="#5a3a1a" stroke="#444" stroke-width="1.2"/>
    <path d="M-28 -38 Q-32 -52 -20 -56" fill="none" stroke="#5a3a1a" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Right arm (idle, hanging with fist) -->
  <g transform="translate(430, 148)">
    <path d="M34 82 C42 110, 50 140, 46 170" fill="none" stroke="#444" stroke-width="16" stroke-linecap="round" opacity="0.08"/>
    <path d="M34 82 C42 110, 50 140, 46 170" fill="none" stroke="#f0f0ed" stroke-width="14" stroke-linecap="round"/>
    <circle cx="46" cy="174" r="10" fill="#7ec8e3" stroke="#444" stroke-width="1.2"/>
  </g>
</g>

</svg>