name: Sync SwitchesDB Data

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Force regeneration even if the upstream metadata hash is unchanged.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: switchesdb-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sync dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install edn-format

      - name: Regenerate SwitchesDB assets
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            args+=(--force)
          fi
          python scripts/sync_switchesdb.py "${args[@]}"

      - name: Commit generated assets
        shell: bash
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/switchesdb

          if git diff --cached --quiet; then
            echo "No SwitchesDB data changes to commit."
            exit 0
          fi

          git commit -m "Sync SwitchesDB data"
          git push origin "HEAD:${BRANCH_NAME}"

      - name: Workflow summary
        shell: bash
        run: |
          {
            echo "### SwitchesDB sync"
            echo ""
            echo "- Data directory: \`data/switchesdb\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
